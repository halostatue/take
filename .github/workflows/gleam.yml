name: Gleam Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  take:
    name: take — Gleam ${{ matrix.gleam }} OTP ${{ matrix.otp }} / Node ${{ matrix.node }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - '1.14'
          - '1.15'
        otp:
          - 27
          - 28
        node:
          - 24.x

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: take

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            github.com:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: ${{ matrix.otp }}
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        id: node
        with:
          node-version: ${{ matrix.node }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: take@gleam-${{ steps.beam.outputs.gleam-version }}-otp-${{ steps.beam.outputs.otp-version }}-node-${{ steps.node.outputs.node-version }}-hash-${{ hashFiles('take/manifest.toml') }}
          path: take/build

      - run: gleam deps download
      - run: gleam format --check src test
      - run: gleam test --target erlang
      - run: gleam test --target javascript
      - run: gleam run -m glinter

  take_promise:
    name: take_promise — Gleam ${{ matrix.gleam }} / Node ${{ matrix.node }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - '1.14'
          - '1.15'
        node:
          - 24.x

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: take_promise

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            deno.com:443
            github.com:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: 27
          gleam-version: ${{ matrix.gleam }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        id: node
        with:
          node-version: ${{ matrix.node }}

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: take_promise@gleam-${{ steps.beam.outputs.gleam-version }}-node-${{ steps.node.outputs.node-version }}-hash-${{ hashFiles('take_promise/manifest.toml') }}
          path: take_promise/build

      - run: gleam deps download
      - run: gleam format --check src test
      - run: gleam test --target javascript --runtime node
      - run: gleam test --target javascript --runtime deno
      - run: gleam test --target javascript --runtime bun
      - run: gleam run -m glinter
