name: Gleam Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-beam:
    name: Gleam ${{ matrix.gleam }} OTP ${{ matrix.otp }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - "1.14"
          - "1.15"
          - "v1.16.0-rc4"
        otp:
          - 27
          - 28
        include:
          - gleam: "1.15"
            otp: 28
            quality: true

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: packages/take

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            github.com:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: ${{ matrix.otp }}
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: take@gleam-${{ steps.beam.outputs.gleam-version }}-otp-${{ steps.beam.outputs.otp-version }}-hash-${{ hashFiles('packages/take/manifest.toml') }}
          path: packages/take/build

      - name: take — deps
        run: gleam deps download
        working-directory: packages/take

      - name: take — test
        run: gleam test --target erlang
        working-directory: packages/take

      - name: take — format check
        if: matrix.quality
        run: gleam format --check src test
        working-directory: packages/take

      - name: take — lint
        if: matrix.quality
        run: gleam run -m glinter
        working-directory: packages/take

  test-bun:
    name: Gleam ${{ matrix.gleam }} / Bun ${{ matrix.bun }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - "1.14"
          - "1.15"
          - "v1.16.0-rc4"
        bun:
          - latest

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: packages/take_promise

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            github.com:443
            hex.pm:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: 28
          gleam-version: ${{ matrix.gleam }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        id: bun
        with:
          bun-version: ${{ matrix.bun }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: gleam-${{ steps.beam.outputs.gleam-version }}-bun-${{ steps.bun.outputs.bun-version }}-hash-${{ hashFiles('**/manifest.toml') }}
          path: |
            **/build

      - name: take — deps
        run: gleam deps download
        working-directory: packages/take

      - name: take — test
        run: gleam test --target javascript --runtime bun
        working-directory: packages/take

      - name: take_promise — deps
        run: gleam deps download
        working-directory: packages/take_promise

      - name: take_promise — test
        run: gleam test --target javascript --runtime bun
        working-directory: packages/take_promise

  test-deno:
    name: Gleam ${{ matrix.gleam }} / Deno ${{ matrix.deno }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - "1.14"
          - "1.15"
          - "v1.16.0-rc4"
        deno:
          - v2.x

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            deno.com:443
            github.com:443
            hex.pm:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: 28
          gleam-version: ${{ matrix.gleam }}

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        id: deno
        with:
          deno-version: ${{ matrix.deno }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: take_promise@gleam-${{ steps.beam.outputs.gleam-version }}-deno-${{ steps.deno.outputs.deno-version }}-hash-${{ hashFiles('packages/take_promise/manifest.toml') }}
          path: packages/take_promise/build

      - name: take — deps
        run: gleam deps download
        working-directory: packages/take

      - name: take — test
        run: gleam test --target javascript --runtime deno
        working-directory: packages/take

      - name: take_promise — deps
        run: gleam deps download
        working-directory: packages/take_promise

      - name: take_promise — test
        run: gleam test --target javascript --runtime deno
        working-directory: packages/take_promise

  test-node:
    name: Gleam ${{ matrix.gleam }} / Node ${{ matrix.node }}

    strategy:
      fail-fast: false
      matrix:
        gleam:
          - "1.14"
          - "1.15"
          - "v1.16.0-rc4"
        node:
          - 24.x
        include:
          - gleam: "1.15"
            node: 24.x
            quality: true

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            builds.hex.pm:443
            github.com:443
            hex.pm:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            release-assets.githubusercontent.com:443
            repo.hex.pm:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        id: beam
        with:
          otp-version: 28
          gleam-version: ${{ matrix.gleam }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        id: node
        with:
          node-version: ${{ matrix.node }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: take_promise@gleam-${{ steps.beam.outputs.gleam-version }}-node-${{ steps.node.outputs.node-version }}-hash-${{ hashFiles('packages/take_promise/manifest.toml') }}
          path: packages/take_promise/build

      - name: take — deps
        run: gleam deps download
        working-directory: packages/take

      - name: take — test
        run: gleam test --target javascript --runtime node
        working-directory: packages/take

      - name: take_promise — deps
        run: gleam deps download
        working-directory: packages/take_promise

      - name: take_promise — test
        run: gleam test --target javascript --runtime node
        working-directory: packages/take_promise

      - name: take_promise — format check
        if: matrix.quality
        run: gleam format --check src test
        working-directory: packages/take_promise

      - name: take_promise — lint
        if: matrix.quality
        run: gleam run -m glinter
        working-directory: packages/take_promise
